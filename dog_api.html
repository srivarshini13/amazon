<!DOCTYPE html>
<html>
<head>
    <title>Random Husky Image</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
            margin-top: 40px;
        }

        button {
            padding: 10px 18px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background-color: #45a049;
        }

        img {
            margin-top: 20px;
            width: 300px;
            border: 2px solid #ccc;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h2>Random Husky Image</h2>

    <button onclick="getDog()">Get Random Husky</button>

    <br><br>

    <img id="dogImg" alt="Husky Image">

    <script>
        async function getDog() {
            try {
                const response = await fetch(
                    "https://dog.ceo/api/breed/husky/images/random"
                );

                if (!response.ok) {
                    throw new Error("Failed to fetch dog image");
                }

                const data = await response.json();

                document.getElementById("dogImg").src = data.message;

            } catch (error) {
                console.log(error);
            }
        }
    </script>

</body>
</html>
