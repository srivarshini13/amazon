<!DOCTYPE html>
<html>
<head>
    <title>Pokemon Battle</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .battle{
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        img{
            width: 150px;
        }
    </style>
</head>
<body>

<h2>Pokemon Battle</h2>

<button onclick="battle()">Start Battle</button>

<div class="battle">
    <div>
        <h3 id="name1"></h3>
        <img id="img1">
    </div>

    <div>
        <h3 id="name2"></h3>
        <img id="img2">
    </div>
</div>

<h2 id="winner"></h2>

<script>

async function battle(){

    let id1 = Math.floor(Math.random()*100)+1;
    let id2 = Math.floor(Math.random()*100)+1;

    let p1 = await fetch(`https://pokeapi.co/api/v2/pokemon/${id1}`);
    let p2 = await fetch(`https://pokeapi.co/api/v2/pokemon/${id2}`);

    p1 = await p1.json();
    p2 = await p2.json();

    img1.src = p1.sprites.front_default;
    img2.src = p2.sprites.front_default;

    name1.innerHTML = p1.name;
    name2.innerHTML = p2.name;

    if(p1.base_experience > p2.base_experience)
        winner.innerHTML = p1.name + " Wins!";
    else if(p2.base_experience > p1.base_experience)
        winner.innerHTML = p2.name + " Wins!";
    else
        winner.innerHTML = "Draw!";
}

</script>

</body>
</html>
