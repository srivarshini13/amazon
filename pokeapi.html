<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeAPI</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 50px;
        }

        .container {
            width: 300px;
            margin: auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 8px lightgray;
        }

        input {
            padding: 8px;
            width: 180px;
        }

        button {
            padding: 8px 12px;
            margin-top: 10px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:hover {
            background-color: #0056b3;
        }

        img {
            margin-top: 20px;
            width: 150px;
            height: 150px;
        }

        h4 {
            text-transform: capitalize;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">

        <h2>Pokémon Search</h2>

        <input id="pokiname" placeholder="Enter a Pokémon name">

        <br><br>

        <button onclick="pokidata()">Search</button>

        <br>

        <img src="" id="pokiimg">

        <h4 id="pokinameDisplay"></h4>

    </div>

    <script>
        async function pokidata() {

            try {

                const pokiname = document.getElementById("pokiname").value.toLowerCase();

                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokiname}`);

                if (!response.ok) {
                    throw new Error("Data fetch failed");
                }

                const data = await response.json();

                document.getElementById("pokiimg").src = data.sprites.front_default;

                document.getElementById("pokinameDisplay").textContent = data.name;

            } catch (err) {
                alert("Pokémon not found!");
            }
        }
    </script>

</body>
</html>
